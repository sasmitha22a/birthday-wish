<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Rash ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  color: white;
  overflow-x: hidden;

  display: flex;
  flex-direction: column;
  justify-content: center;   /* vertical center */
  align-items: center;       /* horizontal center */
  height: 100vh;             /* full screen height */
  text-align: center;
}
/* Loader */
#loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

/* Title Glow */
.glow {
  margin: 0;
  font-size: 45px;
  animation: glow 1.5s infinite alternate;
}
@keyframes glow {
  from { text-shadow: 0 0 10px white; }
  to { text-shadow: 0 0 30px yellow, 0 0 40px red; }
}

p {
  font-size: 20px;
  padding: 0 20px;
}

.gallery img {
  width: 220px;
  margin: 10px;
  border-radius: 20px;
  box-shadow: 0 0 15px rgba(0,0,0,0.3);
}

button {
  padding: 12px 20px;
  font-size: 18px;
  border: none;
  border-radius: 25px;
  background: #ff4e50;
  color: white;
  cursor: pointer;
}

/* Hearts */
.heart {
  position: fixed;
  bottom: -10px;
  color: red;
  animation: float 5s linear infinite;
}

@keyframes float {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}
</style>
</head>

<body>

<!-- Loader -->
<div id="loader">
  <h2>Loading Surprise for Rash... 💖</h2>
</div>

<h1 class="glow">🎂 Happy Birthday Rash ❤️</h1>

<p>
  En life la vandha best gift nee dhaan Rash 💕 <br><br>
  Un smile enakku strength 😍 <br><br>
  Un kooda irukka every moment enakku priceless 💖 <br><br>
  Naan eppavum un kooda iruppen 💫
</p>

<button onclick="goToSurprise()">💖 Click for Surprise 💖</button>

<br><br>

<audio id="remo" loop>
  <source src="C:\Users\Sasmitha\OneDrive\Desktop\sas\remo.mp3.mpeg" type="audio/mpeg">
</audio>

<!-- Confetti -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
// Loader hide
window.onload = function() {
  document.getElementById("loader").style.display = "none";
}

// Button click
function playMusic() {
  document.getElementById("remo").play();

  confetti({
    particleCount: 150,
    spread: 100,
    origin: { y: 0.6 }
  });

  alert("I love you Rash ❤️");
}

// Hearts animation
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = Math.random() * 20 + 20 + "px";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}, 300);


// Auto play Remo when user clicks anywhere (first interaction)
document.body.addEventListener("click", function firstPlay() {
  document.getElementById("remo").play();
  document.body.removeEventListener("click", firstPlay);
});
 

function goToSurprise() {
  window.location.href = "surprise.html";
}
</script>

</body>
</html>
